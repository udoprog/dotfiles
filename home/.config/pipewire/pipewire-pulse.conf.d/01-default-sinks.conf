stream.rules = [
  {
    matches = [
      { application.name = "Firefox" }
    ]
    actions = {
      update-props = {
        node.target = "Web"
        node.dont-fallback = false
        node.linger = false
      }
    }
  }
  {
    matches = [
      { media.role = "Music" }
    ]
    actions = {
      update-props = {
        node.target = "Music"
        node.dont-fallback = false
        node.linger = false
      }
    }
  }
  {
    matches = [
      { application.name = "mpv" }
      { media.role = "Movie" }
    ]
    actions = {
      update-props = {
        node.target = "Movie"
        node.dont-fallback = false
        node.linger = false
      }
    }
  }
  {
    matches = [
      { application.process.binary = "Discord" }
      { application.name = "Mumble" }
    ]
    actions = {
      update-props = {
        node.target = "VoIP"
        node.dont-fallback = false
        node.linger = false
      }
    }
  }
]
